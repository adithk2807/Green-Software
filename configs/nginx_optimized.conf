# OPTIMIZED — all energy-reducing directives enabled
worker_processes  auto;          # Use all CPU cores

events {
    worker_connections  4096;
    use                 epoll;   # Linux event model
    multi_accept        on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;          # Kernel zero-copy file transfer
    tcp_nopush      on;          # Batch TCP packets
    tcp_nodelay     on;

    keepalive_timeout   15;      # Reduced: fewer idle connections
    keepalive_requests  1000;

    gzip              on;
    gzip_comp_level   4;         # Level 4: good compression/CPU tradeoff
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml
                      application/xml text/javascript;
    gzip_vary         on;

    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    server {
        listen       80;
        server_name  localhost;
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }
    }
}